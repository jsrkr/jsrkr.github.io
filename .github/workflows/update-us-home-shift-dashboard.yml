name: Update U.S. Home-Shift Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1-5"

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl requests pytrends

      - name: Build dashboard data
        run: python scripts/build_us_home_shift_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai_work_fertility_sample.json ai-work-fertility-dashboard-data.js
          git diff --cached --quiet || git commit -m "Update U.S. home-shift dashboard data"
          git push
